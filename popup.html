<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Session Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 15px;
    }
    input {
      padding: 5px;
      width: 70%;
      margin-right: 5px;
    }
    button {
      padding: 5px 10px;
      background-color: #0060df;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #003eaa;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-link {
      cursor: pointer;
      color: #0060df;
      text-decoration: underline;
      flex-grow: 1;
    }
    .delete-btn {
      background-color: #d70022;
      margin-left: 10px;
      font-size: 12px;
      padding: 3px 6px;
    }
    .delete-btn:hover {
      background-color: #a4000f;
    }
    .empty-list {
      color: #737373;
      font-style: italic;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
    }
    .icon-btn:hover {
      background-color: #eee;
      color: #0060df;
    }
    #settingsPanel {
      display: none;
      margin: 8px 0;
      padding: 8px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #settingsPanel .panel-row {
      display: flex;
      gap: 8px;
    }
    #settingsPanel button {
      flex: 1;
    }
    #ioStatus {
      margin-top: 6px;
      font-size: 12px;
      color: #444;
      min-height: 14px;
    }
    /* Saved-session rows — the whole block between dividers highlights on hover */
    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
      border-bottom: 1px solid #ddd;
    }
    .session-item:hover {
      background-color: #e9eefb;
    }
    .session-name {
      cursor: pointer;
      color: #0060df;
      flex-grow: 1;
    }
    .session-name:hover {
      text-decoration: underline;
    }
    .btn-delete {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #d70022;
      margin-left: 10px;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-delete:hover {
      background-color: #fbd6d9;
      color: #a4000f;
    }
    .btn-delete svg {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Session Saver</h1>
    <button id="settingsBtn" class="icon-btn" title="Backup &amp; restore" aria-label="Backup &amp; restore">&#9881;</button>
  </div>
  <div>
    <input type="text" id="sessionName" placeholder="Enter session name" />
    <button id="saveBtn">Save</button>
  </div>
  <h2>Saved Sessions</h2>
  <div id="undoContainer"></div>
  <div id="sessionsList"></div>
  <script src="popup.js"></script>
</body>

</html>
