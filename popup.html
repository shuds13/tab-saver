<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Session Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 15px;
    }
    input {
      padding: 5px;
      width: 70%;
      margin-right: 5px;
    }
    button {
      padding: 5px 10px;
      background-color: #0060df;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #003eaa;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-link {
      cursor: pointer;
      color: #0060df;
      text-decoration: underline;
      flex-grow: 1;
    }
    .delete-btn {
      background-color: #d70022;
      margin-left: 10px;
      font-size: 12px;
      padding: 3px 6px;
    }
    .delete-btn:hover {
      background-color: #a4000f;
    }
    .empty-list {
      color: #737373;
      font-style: italic;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
    }
    .icon-btn:hover {
      background-color: #eee;
      color: #0060df;
    }
    #settingsPanel {
      display: none;
      margin: 8px 0;
      padding: 8px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #settingsPanel .panel-row {
      display: flex;
      gap: 8px;
    }
    #settingsPanel button {
      flex: 1;
    }
    #ioStatus {
      margin-top: 6px;
      font-size: 12px;
      color: #444;
      min-height: 14px;
    }
    /* Saved-session rows — the whole block between dividers highlights on hover */
    .session-item {
      display: block;
      padding: 8px 6px;
      border-bottom: 1px solid #ddd;
    }
    .session-item:hover {
      background-color: #e9eefb;
    }
    .session-name {
      cursor: pointer;
      color: #0060df;
      flex-grow: 1;
    }
    .session-name:hover {
      text-decoration: underline;
    }
    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .options-trigger {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-left: 10px;
      font-size: 20px;
      line-height: 1;
      color: #555;
      background: none;
      border: none;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
    }
    .options-trigger:hover {
      background-color: #e0e0e0;
      color: #0060df;
    }
    /* Inline action menu opened from the Options button */
    .row-menu {
      display: none;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      background-color: #fff;
    }
    .row-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background-color: #fff;
      color: #222;
      border: none;
      border-radius: 0;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .row-menu button:hover {
      background-color: #eef2ff;
    }
    .row-menu .menu-sep {
      border-top: 1px solid #e0e0e0;
    }
    .row-menu .danger {
      color: #d70022;
    }
    .row-menu .danger:hover {
      background-color: #fbe9ea;
    }
    /* Explore: list of a session's tabs, shown in the menu under Explore */
    .explore-panel {
      display: none;
      background-color: #e9eefb;
    }
    .explore-tab {
      padding: 6px 10px 6px 20px;
      font-size: 12px;
      color: #0060df;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .explore-tab:hover {
      background-color: #d8e2fb;
      text-decoration: underline;
    }
    /* Briefly flash a just-added tab in the explore list */
    @keyframes exploreTabNew {
      from { background-color: #bfe3c6; }
      to { background-color: transparent; }
    }
    .explore-tab-new {
      animation: exploreTabNew 1.6s ease-out;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Session Saver</h1>
    <div class="header-actions">
      <button id="zapBtn" class="icon-btn" title="Zap duplicate tabs in this window" aria-label="Zap duplicate tabs">&#9889;</button>
      <button id="settingsBtn" class="icon-btn" title="Backup &amp; restore" aria-label="Backup &amp; restore">&#9881;</button>
    </div>
  </div>
  <div>
    <input type="text" id="sessionName" placeholder="Enter session name" />
    <button id="saveBtn">Save</button>
  </div>
  <h2>Saved Sessions</h2>
  <div id="undoContainer"></div>
  <div id="sessionsList"></div>
  <script src="popup.js"></script>
</body>

</html>
