<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Session Saver</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      width: 300px;
      padding: 10px;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 15px;
    }
    input {
      padding: 5px;
      width: 70%;
      margin-right: 5px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    input:focus {
      outline: none;
      border-color: #0060df;
      box-shadow: 0 0 0 2px rgba(0, 96, 223, 0.2);
    }
    .save-toggle {
      position: relative;
      display: inline-block;
      width: 26px;
      height: 14px;
      vertical-align: middle;
      margin-left: 6px;
    }
    .save-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
    }
    .save-toggle .slider {
      position: absolute;
      inset: 0;
      background-color: #ccc;
      border-radius: 14px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .save-toggle .slider::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      left: 2px;
      top: 2px;
      background-color: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .save-toggle input:checked + .slider {
      background-color: #0060df;
    }
    .save-toggle input:checked + .slider::before {
      transform: translateX(12px);
    }
    button {
      padding: 5px 10px;
      background-color: #0060df;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #003eaa;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-link {
      cursor: pointer;
      color: #0060df;
      text-decoration: underline;
      flex-grow: 1;
    }
    .delete-btn {
      background-color: #d70022;
      margin-left: 10px;
      font-size: 12px;
      padding: 3px 6px;
    }
    .delete-btn:hover {
      background-color: #a4000f;
    }
    .empty-list {
      color: #737373;
      font-style: italic;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
    }
    .icon-btn:hover {
      background-color: #eee;
      color: #0060df;
    }
    /* Brief brighten/pulse when the Zap button is pressed */
    @keyframes zapFlash {
      0%   { transform: scale(1);    filter: brightness(1); }
      30%  { transform: scale(1.25); filter: brightness(1.7); }
      100% { transform: scale(1);    filter: brightness(1); }
    }
    .zap-flash {
      animation: zapFlash 0.35s ease-out;
    }
    #settingsPanel {
      display: none;
      margin: 8px 0;
      padding: 8px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #settingsPanel .panel-row {
      display: flex;
      gap: 8px;
    }
    #settingsPanel button {
      flex: 1;
    }
    #ioStatus {
      margin-top: 6px;
      font-size: 12px;
      color: #444;
      min-height: 14px;
    }
    /* Saved-session rows — the whole block between dividers highlights on hover */
    .session-item {
      display: block;
      padding: 8px 6px;
      border-bottom: 1px solid #ddd;
    }
    .session-item:hover {
      background-color: #e9eefb;
    }
    .session-name {
      cursor: pointer;
      color: #0060df;
      flex-grow: 1;
    }
    .session-name:hover {
      text-decoration: underline;
    }
    .session-count {
      color: #737373;
    }
    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .options-trigger {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-left: 10px;
      font-size: 20px;
      line-height: 1;
      color: #555;
      background: none;
      border: none;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
    }
    .options-trigger:hover {
      background-color: #e0e0e0;
      color: #0060df;
    }
    /* Inline action menu opened from the Options button */
    .row-menu {
      display: none;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      background-color: #fff;
    }
    .row-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background-color: #fff;
      color: #222;
      border: none;
      border-radius: 0;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .row-menu button:hover {
      background-color: #eef2ff;
    }
    .row-menu .menu-sep {
      border-top: 1px solid #e0e0e0;
    }
    .row-menu .danger {
      color: #d70022;
    }
    .row-menu .danger:hover {
      background-color: #fbe9ea;
    }
    /* Explore: list of a session's tabs, shown in the menu under Explore */
    .explore-panel {
      display: none;
      background-color: #e9eefb;
    }
    .explore-tab {
      display: flex;
      align-items: center;
      padding: 6px 8px 6px 20px;
      font-size: 12px;
    }
    .explore-tab:hover {
      background-color: #d8e2fb;
    }
    .explore-tab-title {
      flex: 1;
      color: #0060df;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .explore-tab-title:hover {
      text-decoration: underline;
    }
    .explore-tab-del {
      flex: none;
      display: flex;
      align-items: center;
      color: #999;
      cursor: pointer;
      padding: 2px 4px;
      margin-left: 6px;
      border-radius: 3px;
    }
    .explore-tab-del svg {
      display: block;
    }
    .explore-tab-del:hover {
      color: #d70022;
      background-color: #fbe9ea;
    }
    /* Briefly flash a just-added tab in the explore list */
    @keyframes exploreTabNew {
      from { background-color: #bfe3c6; }
      to { background-color: transparent; }
    }
    .explore-tab-new {
      animation: exploreTabNew 1.6s ease-out;
    }
    /* Briefly flash red before a removed tab disappears */
    @keyframes exploreTabRemove {
      from { background-color: #f3c0c4; opacity: 1; }
      to   { background-color: #f3c0c4; opacity: 0; }
    }
    .explore-tab-removing {
      animation: exploreTabRemove 0.45s ease-out forwards;
      pointer-events: none;
    }

    /* Status line colour (dark theme overrides below) */
    #saveStatus { color: #666; }

    /* ---- Dark theme (applied when body has .theme-dark) ---- */
    body.theme-dark { background-color: #202124; color: #e8eaed; }
    .theme-dark input { background-color: #2a2b2e; color: #e8eaed; border-color: #5f6368; }
    .theme-dark input:focus { border-color: #8ab4f8; box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.3); }
    .theme-dark input::placeholder { color: #9aa0a6; }
    .theme-dark #saveStatus { color: #9aa0a6; }
    .theme-dark li { border-bottom-color: #3c4043; }
    .theme-dark .empty-list { color: #9aa0a6; }
    .theme-dark .save-toggle .slider { background-color: #5f6368; }
    .theme-dark .icon-btn { color: #9aa0a6; }
    .theme-dark .icon-btn:hover { background-color: #3c4043; color: #8ab4f8; }
    .theme-dark .session-item { border-bottom-color: #3c4043; }
    .theme-dark .session-item:hover { background-color: #2d3648; }
    .theme-dark .session-name { color: #8ab4f8; }
    .theme-dark .session-count { color: #9aa0a6; }
    .theme-dark .options-trigger { color: #9aa0a6; }
    .theme-dark .options-trigger:hover { background-color: #3c4043; color: #8ab4f8; }
    .theme-dark .row-menu { background-color: #2a2b2e; border-color: #3c4043; }
    .theme-dark .row-menu button { background-color: #2a2b2e; color: #e8eaed; }
    .theme-dark .row-menu button:hover { background-color: #33363a; }
    .theme-dark .row-menu .menu-sep { border-top-color: #3c4043; }
    .theme-dark .row-menu .danger { color: #ff6b6b; }
    .theme-dark .row-menu .danger:hover { background-color: #3a2626; }
    .theme-dark .explore-panel { background-color: #263041; }
    .theme-dark .explore-tab:hover { background-color: #2f3d54; }
    .theme-dark .explore-tab-title { color: #8ab4f8; }
    .theme-dark .explore-tab-del { color: #9aa0a6; }
    .theme-dark .explore-tab-del:hover { color: #ff6b6b; background-color: #3a2626; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Session Saver</h1>
    <div class="header-actions">
      <button id="zapBtn" class="icon-btn" title="Zap duplicate tabs in this window" aria-label="Zap duplicate tabs">&#9889;</button>
      <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
    </div>
  </div>
  <div>
    <input type="text" id="sessionName" placeholder="Enter session name" />
    <button id="saveBtn">Save</button>
  </div>
  <h2>Saved Sessions</h2>
  <div id="undoContainer"></div>
  <div id="sessionsList"></div>
  <script src="popup.js"></script>
</body>

</html>
